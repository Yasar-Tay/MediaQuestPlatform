server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service-auth
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/auth/**
          - id: auth-service-user
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/users/**
          - id: content-service-graphql
            uri: lb://CONTENT-SERVICE
            predicates:
              - Path=/content-graphql
            filters:
              - SetPath=/graphql


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: 12345678901234567890123456789012

logging:
  level:
    org.springframework.security: DEBUG
