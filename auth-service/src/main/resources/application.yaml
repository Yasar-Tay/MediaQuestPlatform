spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/smartedu_db
    username: smartedu_user
    password: smartedu_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: 12345678901234567890123456789012
  expiration-ms: 3600000
